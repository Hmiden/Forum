spring.application.name=Forum
server.port=8082

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/foruml?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# dialect compatible Hibernate 7
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

