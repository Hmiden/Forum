<div class="card mb-4 p-4 shadow-sm rounded">
  <!-- Form title -->
  <h5 class="text-primary fw-semibold mb-3">{{ titleForm }}</h5>

  <!-- Textarea -->
  <div class="mb-3">
    <textarea class="form-control form-control-lg rounded" 
              [(ngModel)]="reply.content" 
              placeholder="Enter reply"
              rows="4"
              required minlength="3"></textarea>
    <div class="text-danger mt-1" *ngIf="reply.content && reply.content.trim().length < 3">
      Reply must be at least 3 characters.
    </div>
  </div>

  <!-- Action buttons -->
  <div class="d-flex">
    <button class="btn btn-success me-2" (click)="onSave()">
      {{ reply.id ? 'Update' : 'Create' }}
    </button>
    <button class="btn btn-secondary" (click)="onCancel()">
      Cancel
    </button>
  </div>
</div>
