<div class="container mt-5">

  <!-- Back button -->
  <div class="mb-3">
    <button class="btn btn-outline-secondary btn-sm" (click)="goBack()">
      <i class="fas fa-arrow-left me-1"></i> Back to Topics
    </button>
  </div>

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold">Replies</h2>
    <button class="btn btn-primary" (click)="showForm = !showForm">
      {{ showForm ? 'Close Form' : 'Add Reply' }}
    </button>
  </div>

  <!-- Reply form -->
  <app-reply-form *ngIf="showForm"
    [reply]="currentReply"
    [titleForm]="currentReply.id ? 'Edit Reply' : 'Add Reply'"
    (save)="handleSave($any($event))"
    (cancel)="cancelForm()">
  </app-reply-form>

  <!-- ✅ Bad word error message -->
  <div class="alert alert-danger d-flex align-items-center mb-3" *ngIf="badWordError">
    <i class="fas fa-exclamation-triangle me-2"></i>
    {{ badWordError }}
  </div>

  <!-- Replies list -->
  <ul class="list-group shadow-sm">
    <li class="list-group-item d-flex justify-content-between align-items-center mb-2 rounded"
        *ngFor="let reply of replies">
      <div class="me-3 text-truncate" style="max-width: 70%;">
        {{ reply.content }}
      </div>
      <div class="d-flex">
        <!-- ✅ Report button -->
        <button class="btn btn-outline-warning btn-sm me-2"
                (click)="openReportModal(reply.id!)"
                title="Report this reply">
          <i class="fas fa-flag"></i> Report
        </button>
        <button class="btn btn-warning btn-sm me-2" (click)="editReply(reply)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="deleteReply(reply.id!)">Delete</button>
      </div>
    </li>

    <!-- No replies message -->
    <li class="list-group-item text-center text-muted" *ngIf="replies.length === 0">
      <i class="fas fa-comment-slash me-2"></i> No replies yet. Be the first to reply !
    </li>
  </ul>

</div>

<!-- ✅ Report Modal -->
<div class="modal fade" id="reportModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-sm rounded">
      <div class="modal-header border-0">
        <h5 class="modal-title text-warning">
          <i class="fas fa-flag me-2"></i> Report Reply
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">

        <!-- Success message -->
        <div class="alert alert-success" *ngIf="reportSuccess">
          <i class="fas fa-check-circle me-2"></i>
          Report submitted successfully ! Admin has been notified.
        </div>

        <!-- Report form -->
        <div *ngIf="!reportSuccess">
          <p class="text-muted mb-3">Why are you reporting this reply ?</p>
          <div class="form-check mb-2">
            <input class="form-check-input" type="radio"
                   name="reason" value="INAPPROPRIATE"
                   [(ngModel)]="reportReason" id="r1">
            <label class="form-check-label" for="r1">
              Inappropriate language
            </label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="radio"
                   name="reason" value="SPAM"
                   [(ngModel)]="reportReason" id="r2">
            <label class="form-check-label" for="r2">
              Spam
            </label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="radio"
                   name="reason" value="HARASSMENT"
                   [(ngModel)]="reportReason" id="r3">
            <label class="form-check-label" for="r3">
              Harassment
            </label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="radio"
                   name="reason" value="OTHER"
                   [(ngModel)]="reportReason" id="r4">
            <label class="form-check-label" for="r4">
              Other
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer border-0" *ngIf="!reportSuccess">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-warning" (click)="submitReport()">
          <i class="fas fa-flag me-1"></i> Submit Report
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteReplyModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-sm rounded">
      <div class="modal-header border-0">
        <h5 class="modal-title text-danger">Confirm Delete</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this reply?</p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" (click)="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>
