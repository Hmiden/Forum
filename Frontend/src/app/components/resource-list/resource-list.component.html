<div class="rl-page">

    <!-- ===== HEADER ===== -->
    <div class="rl-topbar">
      <h1 class="rl-heading">
        Resources
        <span class="rl-count-badge">{{ filtered.length }}</span>
      </h1>
      <button class="rl-btn-add" (click)="openCreate()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Add Resource
      </button>
    </div>
  
    <!-- ===== ALERTS ===== -->
    <div *ngIf="successMsg" class="rl-alert rl-alert-success">{{ successMsg }}</div>
    <div *ngIf="errorMsg"   class="rl-alert rl-alert-danger">{{ errorMsg }}</div>
  
    <!-- ===== FILTERS ===== -->
    <div class="rl-filters">
      <input
        type="text"
        class="rl-input"
        placeholder="Search by title…"
        [(ngModel)]="filterTitle"
        (input)="applyFilters()" />
  
      <select
        class="rl-select"
        [(ngModel)]="filterType"
        (change)="applyFilters()">
        <option value="">All types</option>
        <option value="PDF">PDF</option>
        <option value="VIDEO">VIDEO</option>
        <option value="LINK">LINK</option>
      </select>
    </div>
  
    <!-- ===== FORM ===== -->
    <div *ngIf="showForm" class="rl-form-card">
      <h3 class="rl-form-title">{{ isEditing ? 'Edit Resource' : 'New Resource' }}</h3>
  
      <div class="rl-form-grid">
  
        <input
          class="rl-input rl-full"
          type="text"
          placeholder="Title *"
          [(ngModel)]="current.title" />
  
        <select class="rl-select" [(ngModel)]="current.type">
          <option *ngFor="let t of types" [value]="t">{{ t }}</option>
        </select>
  
        <select class="rl-select" [(ngModel)]="current.topicId">
          <option value="" disabled>Select Topic *</option>
          <option *ngFor="let t of topics" [value]="t.id">{{ t.title }}</option>
        </select>
  
        <input
          class="rl-input rl-full"
          type="url"
          placeholder="URL *"
          [(ngModel)]="current.url" />
  
        <textarea
          class="rl-textarea rl-full"
          rows="3"
          placeholder="Description (optional)"
          [(ngModel)]="current.description">
        </textarea>
  
      </div>
  
      <div class="rl-form-actions">
        <button class="rl-btn-save" (click)="save()">
          {{ isEditing ? 'Update' : 'Save' }}
        </button>
        <button class="rl-btn-cancel" (click)="cancelForm()">Cancel</button>
      </div>
    </div>
  
    <!-- ===== EMPTY STATE ===== -->
    <div *ngIf="filtered.length === 0 && !showForm" class="rl-empty">
      No resources found.
    </div>
  
    <!-- ===== RESOURCE LIST ===== -->
    <div *ngFor="let r of filtered" class="rl-card">
  
      <div class="rl-card-main">
  
        <!-- Type icon -->
        <div class="rl-type-icon" [ngClass]="'rl-type-' + r.type.toLowerCase()">
          <svg *ngIf="r.type === 'PDF'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 4a2 2 0 012-2h6l4 4v10a2 2 0 01-2 2H5a2 2 0 01-2-2V4z" stroke="#E24B4A" stroke-width="1.2" fill="none"/>
            <path d="M11 2v4h4" stroke="#E24B4A" stroke-width="1.2" fill="none"/>
            <path d="M7 11h6M7 13.5h4" stroke="#E24B4A" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <svg *ngIf="r.type === 'VIDEO'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="4" width="16" height="12" rx="2" stroke="#D85A30" stroke-width="1.2"/>
            <path d="M8 7.5l5 2.5-5 2.5V7.5z" fill="#D85A30"/>
          </svg>
          <svg *ngIf="r.type === 'LINK'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M9 4H5a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-4" stroke="#378ADD" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M13 3h4v4M17 3l-6 6" stroke="#378ADD" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
  
        <!-- Body -->
        <div class="rl-card-body">
          <div class="rl-card-title">{{ r.title }}</div>
          <div *ngIf="r.description" class="rl-card-desc">{{ r.description }}</div>
  
          <div class="rl-card-meta">
            <span class="rl-badge" [ngClass]="'rl-badge-' + r.type.toLowerCase()">{{ r.type }}</span>
            <span class="rl-badge rl-badge-topic">{{ r.topicName || '—' }}</span>
            <a class="rl-card-url" [href]="r.url" target="_blank">{{ r.url }}</a>
          </div>
  
          <button class="rl-btn-preview" (click)="togglePreview(r.id)">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M1 6.5s2-4 5.5-4 5.5 4 5.5 4-2 4-5.5 4-5.5-4-5.5-4z" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="6.5" cy="6.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            {{ openPreviewId === r.id ? 'Hide preview' : 'Show preview' }}
          </button>
        </div>
  
        <!-- Actions -->
        <div class="rl-card-actions">
          <button class="rl-btn-edit" (click)="openEdit(r)">Edit</button>
          <button class="rl-btn-del"  (click)="delete(r.id)">Delete</button>
        </div>
  
      </div>
  
      <!-- Preview panel -->
      <div class="rl-preview-bar" [class.open]="openPreviewId === r.id">
        <ng-container *ngIf="openPreviewId === r.id">
  
          <ng-container *ngIf="r.type === 'PDF'">
            <iframe
              class="rl-preview-frame"
              [src]="r.url | safe"
              title="PDF preview">
            </iframe>
          </ng-container>
  
          <ng-container *ngIf="r.type === 'VIDEO'">
            <iframe
              class="rl-preview-frame"
              [src]="getEmbedUrl(r.url) | safe"
              allowfullscreen
              title="Video preview">
            </iframe>
          </ng-container>
  
          <ng-container *ngIf="r.type === 'LINK'">
            <div class="rl-link-preview">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 4H6a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-4" stroke="#378ADD" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M13 3h4v4M17 3l-6 6" stroke="#378ADD" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              <a [href]="r.url" target="_blank">{{ r.url }}</a>
            </div>
          </ng-container>
  
        </ng-container>
      </div>
  
    </div>
  
  </div>
