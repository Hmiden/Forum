<div class="container mt-5">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold">Categories</h2>
    <button class="btn btn-primary" (click)="showForm = !showForm">
      {{ showForm ? 'Close Form' : 'Add Category' }}
    </button>
  </div>

  <!-- Category form -->
  <app-category-form *ngIf="showForm"
    [category]="currentCategory"
    [title]="currentCategory.id ? 'Edit Category' : 'Add Category'"
    (save)="handleSave($event)"
    (cancel)="cancelForm()">
  </app-category-form>

  <!-- Categories list -->
  <ul class="list-group shadow-sm">
    <li class="list-group-item d-flex justify-content-between align-items-center mb-2 rounded"
        *ngFor="let category of categories">

      <div class="me-3">
        <h5 class="mb-1 text-truncate" style="max-width: 300px;">{{ category.name }}</h5>
        <small class="text-muted d-block text-truncate" style="max-width: 300px;">
          {{ category.description }}
        </small>
        <!-- ✅ Topic count badge -->
        <small class="text-muted">
          <i class="fas fa-comments me-1"></i>
          <span class="fw-semibold">Topics : {{ category.topicCount ?? 0 }}</span>
        </small>
      </div>

      <div class="d-flex">
        <button class="btn btn-success btn-sm me-2" (click)="addTopic(category)">Add Topic</button>
        <button class="btn btn-warning btn-sm me-2" (click)="editCategory(category)">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="deleteCategory(category.id!)">Delete</button>
      </div>
    </li>

    <!-- No categories message -->
    <li class="list-group-item text-center text-muted" *ngIf="categories.length === 0">
      <i class="fas fa-folder-open me-2"></i> No categories yet.
    </li>
  </ul>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-sm rounded">
      <div class="modal-header border-0">
        <h5 class="modal-title text-danger">Confirm Delete</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this category?</p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" (click)="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>
